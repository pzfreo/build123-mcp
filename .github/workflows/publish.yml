name: Publish

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set TestPyPI dev version
        if: github.event_name == 'push'
        run: |
          current=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          base="${current%.dev*}"
          uv version "${base}.dev${{ github.run_number }}"
      - name: Strip dev suffix for real release
        if: github.event_name == 'release'
        run: |
          current=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          base="${current%.dev*}"
          uv version "$base"
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-mcp-registry:
    needs: publish-pypi
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # for github-oidc auth to the MCP registry
      contents: read    # for checkout
    steps:
      - uses: actions/checkout@v4
      - name: Sync server.json version with the release tag
        run: |
          tag=${{ github.event.release.tag_name }}
          version=${tag#v}
          python3 - <<EOF
          import json
          with open("server.json") as f:
              d = json.load(f)
          d["version"] = "$version"
          for p in d.get("packages", []):
              p["version"] = "$version"
          with open("server.json", "w") as f:
              json.dump(d, f, indent=2)
          EOF
      - name: Install mcp-publisher
        run: |
          curl -sL -o mcp-publisher \
            https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64
          chmod +x mcp-publisher
      - name: Login via GitHub OIDC
        run: ./mcp-publisher login github-oidc
      - name: Publish to MCP registry
        run: ./mcp-publisher publish

  bump-version:
    needs: publish-pypi
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Bump patch version with .dev0 suffix
        run: |
          current=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          base="${current%.dev*}"
          IFS='.' read -r major minor patch <<< "$base"
          uv version "${major}.${minor}.$((patch + 1)).dev0"
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          new_version=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          git add pyproject.toml uv.lock
          git commit -m "chore: bump version to ${new_version} after release"
          git push
